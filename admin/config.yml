backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: "https://luxbuild.it.com"
display_url: "https://luxbuild.it.com"
logo_url: "https://luxbuild.it.com/images/WhatsApp%20Image%202026-06-09%20at%2013.59.08.jpeg"

collections:
  - name: "settings"
    label: "Website content"
    files:
      - name: "gallery"
        label: "Gallery photos"
        file: "data/gallery.json"
        format: "json"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Category title"
                name: "title"
                widget: "string"
              - label: "Photos"
                name: "photos"
                widget: "list"
                summary: "{{fields.image}}"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                    required: true
